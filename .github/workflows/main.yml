name: Publish to nuget

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    permissions:
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Check version
        id: version
        run: |
          LOCAL_VERSION=$(grep -E '^#:property Version=' ImageToPdf.cs | head -1 | sed 's/.*=//')
          if [ -z "$LOCAL_VERSION" ]; then
            echo "No version found in ImageToPdf.cs" >&2
            exit 1
          fi

          LATEST=$(curl -sf https://api.nuget.org/v3-flatcontainer/imagetopdf/index.json | jq -r '.versions | last // empty')

          if [ -z "$LATEST" ]; then
            SHOULD_PUBLISH=true
          elif [ "$(printf '%s\n%s' "$LATEST" "$LOCAL_VERSION" | sort -V | tail -n1)" = "$LOCAL_VERSION" ] && [ "$LOCAL_VERSION" != "$LATEST" ]; then
            SHOULD_PUBLISH=true
          else
            SHOULD_PUBLISH=false
          fi

          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_published=$LATEST" >> "$GITHUB_OUTPUT"
          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "Local version: $LOCAL_VERSION"
          echo "Latest on nuget.org: ${LATEST:-none}"
          echo "Should publish: $SHOULD_PUBLISH"

      - name: Pack
        if: steps.version.outputs.should_publish == 'true'
        run: dotnet pack -c Release ImageToPdf.cs -o .

      - name: NuGet login (OIDC → temp API key)
        if: steps.version.outputs.should_publish == 'true'
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet
        if: steps.version.outputs.should_publish == 'true'
        run: dotnet nuget push *.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source "https://api.nuget.org/v3/index.json" --skip-duplicate
